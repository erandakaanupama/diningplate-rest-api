openapi: 3.0.3
info:
  title: DiningPlate Order API
  description: REST API for managing orders in the DiningPlate platform.
  version: 1.0.0

servers:
  - url: /api/v1
    description: Order API base path

paths:
  /orders:
    post:
      summary: Create a new order
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'

    get:
      summary: List orders
      operationId: listOrders
      tags: [Orders]
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderPage'

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Get an order by ID
      operationId: getOrder
      tags: [Orders]
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      summary: Cancel an order
      operationId: cancelOrder
      tags: [Orders]
      responses:
        '204':
          description: Order cancelled
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /menu:
    get:
      summary: List menu items
      operationId: listMenuItems
      tags: [Menu]
      parameters:
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/MenuCategory'
        - name: available
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated list of menu items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MenuPage'

  /orders/{orderId}/status:
    parameters:
      - name: orderId
        in: path
        required: true
        schema:
          type: string
          format: uuid

    patch:
      summary: Update order status
      operationId: updateOrderStatus
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

components:
  schemas:

    Order:
      type: object
      required: [id, customerId, items, status, totalAmount, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        location:
          type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderItem'
        status:
          $ref: '#/components/schemas/OrderStatus'
        totalAmount:
          type: number
          format: double
          minimum: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderItem:
      type: object
      required: [menuItemId, quantity, unitPrice]
      properties:
        menuItemId:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: integer
          minimum: 1
        unitPrice:
          type: number
          format: double
          minimum: 0

    CreateOrderRequest:
      type: object
      required: [name, mobile, location, items]
      properties:
        name:
          type: string
        mobile:
          type: string
        email:
          type: string
          format: email
        location:
          type: string

        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateOrderItemRequest'

    CreateOrderItemRequest:
      type: object
      required: [menuItemId, quantity]
      properties:
        menuItemId:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1

    UpdateOrderStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/OrderStatus'

    OrderStatus:
      type: string
      enum:
        - NEW
        - ACCEPTED
        - PREPARING
        - DISPATCHED
        - COMPLETED

    MenuItem:
      type: object
      required: [id, name, price, category, available]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: number
          format: double
          minimum: 0
        category:
          $ref: '#/components/schemas/MenuCategory'
        available:
          type: boolean

    MenuCategory:
      type: string
      enum:
        - STARTER
        - MAIN
        - DESSERT
        - BEVERAGE
        - SIDE

    MenuPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/MenuItem'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    OrderPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Order'
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        page:
          type: integer
        size:
          type: integer

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        timestamp:
          type: string
          format: date-time

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: State conflict (e.g. cancelling a delivered order)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
